plugins {
    id 'com.android.application'
}

android {
    namespace 'org.convoy.pinyinime'
    compileSdk 34

    defaultConfig {
        applicationId 'org.convoy.pinyinime'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '0.1.0-alpha'
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
}
